name: expense_tracker
description: A cross-platform personal expense tracking app built with Flutter, BLoC, SQLite, and FL Chart.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Local storage
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Charts
  fl_chart: ^0.66.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  get_it: ^7.6.4

  # Icons & UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
